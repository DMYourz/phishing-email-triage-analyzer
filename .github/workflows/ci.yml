name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run test suite (incl. detection regression)
        run: pytest -q
      - name: Smoke-test the CLI on the sample corpus
        run: python -m phishtriage batch samples -o /tmp/reports
      - name: Upload generated reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: triage-reports-py${{ matrix.python-version }}
          path: /tmp/reports

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check phishtriage tests
